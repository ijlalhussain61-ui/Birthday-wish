<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Birthday Surprise 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PASSWORD SCREEN -->
    <div id="password-screen" class="card">
        <h2>Enter Secret Password 🔒</h2>
        <p>Aapko bheja gaya password yahan likhein:</p>
        <input type="password" id="passInput" placeholder="Password daalein...">
        <button onclick="checkPassword()">Unlock Surprise</button>
        <p id="error-msg" style="color:red; display:none;">Ghalat Password! Dobara try karein.</p>
    </div>

    <!-- MAIN BIRTHDAY CARD (Pehle hide rahega) -->
    <div id="birthday-card" class="card" style="display: none;">
        <h2>Cut the Birthday Cake 🎂</h2>
        <p>Tap the button and cut the cake with love.</p>
        <div class="cake" id="cake">🎂</div>
        <button onclick="cutCake()">Cut the Cake</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
